version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hassan
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommercedb
    volumes:
      - ./database-data:/var/lib/postgresql/data/
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - 5432:5432
